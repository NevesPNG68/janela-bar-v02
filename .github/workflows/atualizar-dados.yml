name: Atualizar dados seguros do Janela

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: write

jobs:
  atualizar-dados:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install xlsx

      - name: Gerar dados tratados do dashboard
        env:
          DROPBOX_TOKEN: ${{ secrets.DROPBOX_TOKEN }}
          DROPBOX_FILE_PATH: ${{ secrets.DROPBOX_FILE_PATH }}
          DROPBOX_SEARCH_NAME: Por venda_2026.xlsm
        run: node scripts/gerar_dashboard_data.mjs

      - name: Publicar dados atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dados/dashboard-data.json
          if git diff --cached --quiet; then
            echo "Sem alterações nos dados."
          else
            git commit -m "Atualizar dados tratados do dashboard"
            git push
          fi
