<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JANELA BAR - Dashboard mobile moderno</title>
<style>
  :root{--bg:#f6f7fb;--card:#fff;--border:#dfe4f5;--blue:#0073ea;--green:#00c875;--yellow:#ffcb00;--red:#e2445c;--purple:#a25ddc;--text:#172b4d;--muted:#6b778c}
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:Arial,sans-serif;overflow:hidden}
  #boot{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center;background:var(--bg)}
  .box{max-width:720px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:28px;box-shadow:0 18px 44px rgba(23,43,77,.10)}
  h1{margin:0 0 12px;color:var(--blue);letter-spacing:.02em}p{line-height:1.5;color:var(--muted)}
  a{color:var(--blue);font-weight:bold}
  #mobile-shell{display:none;min-height:100dvh;background:var(--bg)}
  .mobile-status{position:fixed;left:10px;right:10px;top:10px;z-index:20;background:rgba(255,255,255,.96);border:1px solid var(--border);border-left:4px solid var(--blue);border-radius:8px;padding:10px 12px;box-shadow:0 14px 32px rgba(23,43,77,.14)}
  .mobile-status strong{display:block;color:var(--blue);font-size:.8rem;letter-spacing:.04em;text-transform:uppercase;margin-bottom:3px}
  .mobile-status span{display:block;color:var(--muted);font-size:.76rem;line-height:1.3}
  .mobile-status button{margin-top:8px;background:var(--blue);border:0;color:#fff;border-radius:6px;padding:8px 10px;font-weight:800}
  #dashboard-frame{position:fixed;inset:0;width:100%;height:100dvh;border:0;background:var(--bg)}
  .ready .mobile-status{display:none}
</style>
<script>
(function(){
  var isPreview = location.hostname === "raw.githack.com";
  var dashboardUrl = isPreview ? "https://raw.githack.com/NevesPNG68/janela-bar-dashboard/main/" : "/janela-bar-dashboard/";
  var mobileQuery = "(max-width: 820px), (pointer: coarse)";
  var isMobile = window.matchMedia && window.matchMedia(mobileQuery).matches;
  if(!isMobile){
    window.location.replace(dashboardUrl + "?v=" + Date.now());
  }
})();
</script>
</head>
<body>
<div id="boot"><div class="box"><h1>JANELA BAR</h1><p>Carregando dashboard...</p></div></div>
<div id="mobile-shell">
  <iframe id="dashboard-frame" title="JANELA BAR Dashboard mobile"></iframe>
  <div class="mobile-status" id="mobile-status">
    <strong>Visual mobile</strong>
    <span id="mobile-status-text">Aplicando visual mais moderno no celular.</span>
    <button type="button" id="mobile-retry" style="display:none">Tentar novamente</button>
  </div>
</div>
<script>
(function(){
  var isPreview = location.hostname === "raw.githack.com";
  var DASHBOARD_URL = isPreview ? "https://raw.githack.com/NevesPNG68/janela-bar-dashboard/main/" : "/janela-bar-dashboard/";
  var MOBILE_QUERY = "(max-width: 820px), (pointer: coarse)";
  var isMobile = window.matchMedia && window.matchMedia(MOBILE_QUERY).matches;
  if(!isMobile) return;

  var boot = document.getElementById("boot");
  var shell = document.getElementById("mobile-shell");
  var frame = document.getElementById("dashboard-frame");
  var statusText = document.getElementById("mobile-status-text");
  var retry = document.getElementById("mobile-retry");
  var pollTimer = null;
  var safetyTimer = null;

  boot.style.display = "none";
  shell.style.display = "block";
  document.documentElement.style.overflow = "hidden";
  document.body.style.overflow = "hidden";

  function setStatus(text, showRetry){
    statusText.textContent = text;
    retry.style.display = showRetry ? "inline-block" : "none";
    shell.classList.remove("ready");
  }

  function loadFrame(){
    setStatus("Aplicando visual mais moderno no celular.", false);
    frame.src = DASHBOARD_URL + "?modernMobile=1&v=" + Date.now();
    clearTimeout(safetyTimer);
    safetyTimer = setTimeout(function(){
      setStatus("O dashboard demorou para montar. Tente novamente sem sair deste link.", true);
      try{
        var doc = frame.contentDocument;
        if(doc) injectModernStyle(doc);
      }catch(e){}
    }, 18000);
  }

  retry.addEventListener("click", loadFrame);
  frame.addEventListener("load", function(){
    setStatus("Preparando layout moderno...", false);
    patchDashboard();
  });

  function patchDashboard(){
    var doc;
    try{ doc = frame.contentDocument || frame.contentWindow.document; }
    catch(err){ setStatus("Nao foi possivel aplicar o visual automaticamente.", true); return; }
    if(!doc) return;
    injectModernStyle(doc);
    clearInterval(pollTimer);
    pollTimer = setInterval(function(){
      try{
        injectModernStyle(doc);
        installNativeFilters(frame.contentWindow, doc);
        var dashboard = doc.getElementById("dashboard");
        if(dashboard && dashboard.style.display !== "none"){
          clearTimeout(safetyTimer);
          shell.classList.add("ready");
        }
      }catch(e){}
    }, 800);
  }

  function injectModernStyle(doc){
    if(doc.getElementById("v02-modern-mobile-style")) return;
    var style = doc.createElement("style");
    style.id = "v02-modern-mobile-style";
    style.textContent = "@media (max-width:1024px),(pointer:coarse){"+
      ":root{--bg:#f6f7fb!important;--surface:#ffffff!important;--card:#ffffff!important;--border:#dfe4f5!important;--accent:#0073ea!important;--accent2:#00c875!important;--accent3:#a25ddc!important;--text:#172b4d!important;--muted:#6b778c!important;--success:#00c875!important;}"+
      "html,body,#dashboard,.main,.audit-wrap{background:#f6f7fb!important;color:#172b4d!important;}"+
      "#loading-screen,#upload-screen{background:#f6f7fb!important;color:#172b4d!important;}"+
      ".ld-logo,.upload-logo,.topbar-logo,.section-title .tag,.audit-analytic-title{color:#0073ea!important;}"+
      ".ld-logo span,.upload-logo span,.topbar-logo span{color:#172b4d!important;}"+
      ".topbar{background:rgba(255,255,255,.94)!important;border-bottom:1px solid #dfe4f5!important;box-shadow:0 8px 24px rgba(23,43,77,.08)!important;backdrop-filter:blur(14px)!important;padding:.72rem .9rem!important;}"+
      ".topbar-divider{background:#dfe4f5!important;}"+
      ".main{padding:1rem .82rem 2rem!important;}"+
      ".filters{display:grid!important;grid-template-columns:1fr 1fr!important;gap:.68rem!important;width:100%!important;}"+
      ".filter-group{min-width:0!important;width:100%!important;}"+
      ".filter-group label,.kpi-label,.kpi-sub,.chart-card h3,.table-header h3,.fin-kpi-label,.fin-kpi-sub,.goal-week,.table-search,.file-name,.footer{color:#6b778c!important;}"+
      ".filter-group select,.v02-native-select,.table-search,.audit-filter select,.audit-filter input{display:block!important;width:100%!important;min-width:0!important;min-height:42px!important;background:#fff!important;color:#172b4d!important;border:1px solid #cfd7e6!important;border-radius:6px!important;padding:.55rem .68rem!important;font-size:.94rem!important;font-weight:700!important;color-scheme:light!important;box-shadow:0 1px 2px rgba(23,43,77,.04)!important;}"+
      ".filter-group select:focus,.v02-native-select:focus,.table-search:focus{outline:2px solid rgba(0,115,234,.18)!important;border-color:#0073ea!important;}"+
      ".filter-group select option,.v02-native-select option{background:#fff!important;color:#172b4d!important;}"+
      "#f-ano-single-wrap,#f-tipo-single-wrap,#f-pgto-single-wrap,#mes-btn,#grupo-btn,#semana-btn,#dia-btn,#produto-btn,#mes-dropdown,#grupo-dropdown,#semana-dropdown,#dia-dropdown,#produto-dropdown{display:none!important;}"+
      ".kpi-card,.chart-card,.table-card,.audit-box,.audit-result-card,.audit-card,.audit-analytic-card,.goal-panel,.goal-gauge-card,.drink-summary-card,.fin-zone,.fin-kpi{background:#fff!important;background-image:none!important;border:1px solid #dfe4f5!important;border-radius:8px!important;box-shadow:0 10px 26px rgba(23,43,77,.08)!important;color:#172b4d!important;overflow:hidden!important;}"+
      ".kpi-card,.chart-card,.table-card,.audit-box,.audit-result-card,.audit-card,.audit-analytic-card,.goal-panel,.drink-summary-card,.fin-zone{padding:1rem!important;}"+
      ".kpi-card::after,.fin-kpi::after,.chart-card::after,.table-card::after,.audit-box::after,.audit-result-card::after,.audit-card::after,.audit-analytic-card::after,.fin-zone::after,.goal-panel::after,.goal-gauge-card::after,.drink-summary-card::after{display:none!important;}"+
      ".kpi-card::before,.fin-kpi::before,.goal-panel::before{height:4px!important;background:var(--kpi-color,#0073ea)!important;box-shadow:none!important;}"+
      ".kpi-card:hover,.fin-kpi:hover,.chart-card:hover,.table-card:hover,.audit-box:hover,.audit-result-card:hover,.audit-card:hover,.audit-analytic-card:hover,.fin-zone:hover,.goal-panel:hover,.goal-gauge-card:hover,.drink-summary-card:hover{transform:none!important;border-color:#c6d2e3!important;box-shadow:0 14px 32px rgba(23,43,77,.12)!important;}"+
      ".kpi-value,.fin-kpi-val,.audit-result-value,.goal-title,.goal-meta,.goal-value,.goal-pct,.section-title,.audit-card-title{color:#172b4d!important;text-shadow:none!important;}"+
      ".section-title{font-size:1.05rem!important;letter-spacing:.06em!important;margin:1.15rem 0 .75rem!important;}"+
      ".section-title::after{background:#dfe4f5!important;}"+
      ".section-title .tag{background:#e5f1ff!important;color:#0073ea!important;border-radius:6px!important;padding:.2rem .5rem!important;}"+
      ".chart-card h3,.table-header h3{font-size:.68rem!important;letter-spacing:.08em!important;}"+
      ".table-card{padding:0!important;}"+
      ".table-header,.audit-card-head,.audit-analytic-head{background:#fff!important;border-bottom:1px solid #dfe4f5!important;}"+
      ".table-wrap{background:#fff!important;}"+
      "thead th,.audit-analytic-table th{background:#f3f6fb!important;color:#6b778c!important;border-bottom:1px solid #dfe4f5!important;}"+
      "tbody tr,.audit-analytic-table td{border-bottom:1px solid #edf1f7!important;}"+
      "tbody tr:hover,tbody tr:hover td,.audit-analytic-table tr:hover td{background:#f8fbff!important;}"+
      "tbody td,.audit-analytic-table td{color:#172b4d!important;}"+
      ".fin-zone.receita,.fin-zone.despesas{background:#fff!important;border-left-width:5px!important;}"+
      ".fin-zone.receita{border-left-color:#00c875!important;}"+
      ".fin-zone.despesas{border-left-color:#e2445c!important;}"+
      ".fin-zone.receita .fin-zone-title,.fin-zone.receita .fin-kpi-val,.audit-col.entradas .mini-label,.audit-col.entradas .mini-value,.audit-analytic-table td.pos{color:#008f5d!important;}"+
      ".fin-zone.despesas .fin-zone-title,.fin-zone.despesas .fin-kpi-val,.audit-col.saidas .mini-label,.audit-col.saidas .mini-value,.audit-analytic-table td.neg,.audit-result-card.neg .audit-result-value{color:#c7324b!important;}"+
      ".ld-track,.ld-bar-wrap,.lucro-bar-track{background:#dfe4f5!important;stroke:#dfe4f5!important;}"+
      ".ld-fill,.ld-bar{stroke:#0073ea!important;background:#0073ea!important;box-shadow:none!important;}"+
      ".semi-gauge::after{background:#fff!important;box-shadow:inset 0 5px 14px rgba(23,43,77,.08)!important;}"+
      ".reload-btn,.upload-btn,.audit-add,.audit-del{border-radius:6px!important;}"+
      ".reload-btn{background:#fff!important;border:1px solid #cfd7e6!important;color:#172b4d!important;}"+
      ".upload-btn{background:#0073ea!important;color:#fff!important;}"+
      "canvas{filter:none!important;}"+
      "}";
    doc.head.appendChild(style);
  }

  function installNativeFilters(win, doc){
    showOriginalSelect(doc, "f-ano");
    showOriginalSelect(doc, "f-tipo");
    showOriginalSelect(doc, "f-pgto");
    createNativeFilter(win, doc, "mes", "Mes");
    createNativeFilter(win, doc, "grupo", "Grupo");
    createNativeFilter(win, doc, "semana", "Semana do Mes");
    createNativeFilter(win, doc, "dia", "Dia da Semana");
    createNativeFilter(win, doc, "produto", "Produto");
  }

  function showOriginalSelect(doc, id){
    var sel = doc.getElementById(id);
    if(!sel) return;
    sel.style.display = "block";
    var wrap = doc.getElementById(id + "-single-wrap");
    if(wrap) wrap.style.display = "none";
  }

  function createNativeFilter(win, doc, key, label){
    var optionsWrap = doc.getElementById(key + "-options");
    var button = doc.getElementById(key + "-btn");
    if(!optionsWrap || !button) return false;
    var group = button.closest ? button.closest(".filter-group") : button.parentNode;
    if(!group) return false;
    var nativeId = "v02-native-" + key;
    var select = doc.getElementById(nativeId);
    if(!select){
      select = doc.createElement("select");
      select.id = nativeId;
      select.className = "v02-native-select";
      select.setAttribute("aria-label", label);
      group.appendChild(select);
      select.addEventListener("change", function(){ applyNativeValue(win, doc, key, select.value); });
    }
    return populateNativeOptions(doc, key, select);
  }

  function populateNativeOptions(doc, key, select){
    var optionsWrap = doc.getElementById(key + "-options");
    if(!optionsWrap) return false;
    var opts = Array.prototype.slice.call(optionsWrap.querySelectorAll(".ms-opt[data-key='" + key + "']"));
    if(!opts.length) return false;
    var current = select.value;
    select.innerHTML = "";
    var all = doc.createElement("option");
    all.value = "";
    all.textContent = key === "semana" ? "Todas" : "Todos";
    select.appendChild(all);
    opts.forEach(function(opt){
      var value = opt.getAttribute("data-val") || "";
      var option = doc.createElement("option");
      option.value = value;
      option.textContent = value;
      select.appendChild(option);
    });
    if(current && opts.some(function(opt){ return opt.getAttribute("data-val") === current; })) select.value = current;
    return true;
  }

  function applyNativeValue(win, doc, key, value){
    clearMsWithoutRender(doc, key);
    if(value) selectMsWithoutRender(doc, key, value);
    if(typeof win.scheduleApplyFilters === "function") win.scheduleApplyFilters();
    else if(typeof win.applyFilters === "function") win.applyFilters();
  }

  function clearMsWithoutRender(doc, key){
    var label = doc.getElementById(key + "-label");
    Array.prototype.forEach.call(doc.querySelectorAll(".ms-opt[data-key='" + key + "']"), function(el){
      el.classList.remove("ms-on");
      var chk = el.querySelector(".ms-chk");
      if(chk){ chk.textContent = ""; }
    });
    if(label) label.textContent = key === "semana" ? "Todas" : "Todos";
  }

  function selectMsWithoutRender(doc, key, value){
    var opts = Array.prototype.slice.call(doc.querySelectorAll(".ms-opt[data-key='" + key + "']"));
    var opt = opts.find(function(item){ return item.getAttribute("data-val") === value; });
    if(!opt) return;
    opt.classList.add("ms-on");
    var chk = opt.querySelector(".ms-chk");
    if(chk){ chk.textContent = "\u2713"; }
    var label = doc.getElementById(key + "-label");
    if(label) label.textContent = value;
  }

  loadFrame();
})();
</script>
</body>
</html>
