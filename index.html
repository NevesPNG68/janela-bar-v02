<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JANELA BAR - Dashboard moderno</title>
<style>
  :root{--bg:#f4f6fb;--card:#fff;--border:#e3e8f2;--blue:#1f76ff;--text:#172033;--muted:#667085}
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:Arial,sans-serif;overflow:hidden}
  #boot{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center;background:var(--bg)}
  .box{max-width:720px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:28px;box-shadow:0 18px 44px rgba(23,32,51,.10)}
  h1{margin:0 0 12px;color:var(--blue);letter-spacing:.02em}p{line-height:1.5;color:var(--muted)}
  #preview-shell{display:none;min-height:100dvh;background:var(--bg)}
  .status{position:fixed;left:12px;right:12px;top:12px;z-index:20;background:rgba(255,255,255,.96);border:1px solid var(--border);border-left:4px solid var(--blue);border-radius:10px;padding:10px 12px;box-shadow:0 14px 32px rgba(23,32,51,.14);max-width:520px}
  .status strong{display:block;color:var(--blue);font-size:.8rem;letter-spacing:.04em;text-transform:uppercase;margin-bottom:3px}
  .status span{display:block;color:var(--muted);font-size:.76rem;line-height:1.3}
  .status button{margin-top:8px;background:var(--blue);border:0;color:#fff;border-radius:7px;padding:8px 10px;font-weight:800}
  #dashboard-frame{position:fixed;inset:0;width:100%;height:100dvh;border:0;background:var(--bg)}
  .ready .status{display:none}
</style>
</head>
<body>
<div id="boot"><div class="box"><h1>JANELA BAR</h1><p>Carregando visual moderno...</p></div></div>
<div id="preview-shell">
  <iframe id="dashboard-frame" title="JANELA BAR Dashboard moderno"></iframe>
  <div class="status" id="status">
    <strong>Visual moderno</strong>
    <span id="status-text">Aplicando cores e cards mais modernos.</span>
    <button type="button" id="retry" style="display:none">Tentar novamente</button>
  </div>
</div>
<script>
(function(){
  var isPreview = location.hostname === "raw.githack.com";
  var DASHBOARD_URL = isPreview ? "https://raw.githack.com/NevesPNG68/janela-bar-dashboard/main/" : "/janela-bar-dashboard/";
  var boot = document.getElementById("boot");
  var shell = document.getElementById("preview-shell");
  var frame = document.getElementById("dashboard-frame");
  var statusText = document.getElementById("status-text");
  var retry = document.getElementById("retry");
  var pollTimer = null;
  var safetyTimer = null;
  var palette = ["#1f76ff","#00a86b","#f59e0b","#e5484d","#7c3aed","#00b8d9","#ff6b9a","#64748b"];

  boot.style.display = "none";
  shell.style.display = "block";
  document.documentElement.style.overflow = "hidden";
  document.body.style.overflow = "hidden";

  function setStatus(text, showRetry){
    statusText.textContent = text;
    retry.style.display = showRetry ? "inline-block" : "none";
    shell.classList.remove("ready");
  }

  function loadFrame(){
    setStatus("Aplicando cores e cards mais modernos.", false);
    frame.src = DASHBOARD_URL + "?modernVisual=1&v=" + Date.now();
    clearTimeout(safetyTimer);
    safetyTimer = setTimeout(function(){
      setStatus("O dashboard demorou para montar. Tente novamente sem sair deste link.", true);
      try{
        var doc = frame.contentDocument;
        if(doc) injectModernStyle(doc);
      }catch(e){}
    }, 18000);
  }

  retry.addEventListener("click", loadFrame);
  frame.addEventListener("load", function(){
    setStatus("Preparando layout moderno...", false);
    patchDashboard();
  });

  function patchDashboard(){
    var doc;
    try{ doc = frame.contentDocument || frame.contentWindow.document; }
    catch(err){ setStatus("Nao foi possivel aplicar o visual automaticamente.", true); return; }
    if(!doc) return;
    injectModernStyle(doc);
    clearInterval(pollTimer);
    pollTimer = setInterval(function(){
      try{
        injectModernStyle(doc);
        installNativeFilters(frame.contentWindow, doc);
        tuneChartColors(frame.contentWindow);
        var dashboard = doc.getElementById("dashboard");
        if(dashboard && dashboard.style.display !== "none"){
          clearTimeout(safetyTimer);
          shell.classList.add("ready");
        }
      }catch(e){}
    }, 800);
  }

  function injectModernStyle(doc){
    if(doc.getElementById("v02-modern-style")) return;
    var style = doc.createElement("style");
    style.id = "v02-modern-style";
    style.textContent =
      ":root{--bg:#f4f6fb!important;--surface:#ffffff!important;--card:#ffffff!important;--border:#e3e8f2!important;--accent:#1f76ff!important;--accent2:#00a86b!important;--accent3:#7c3aed!important;--text:#172033!important;--muted:#667085!important;--success:#00a86b!important;}"+
      "*,*::before,*::after{text-shadow:none!important;}"+
      "html,body,#dashboard,.main,.audit-wrap{background:#f4f6fb!important;color:#172033!important;}"+
      "#loading-screen,#upload-screen{background:#f4f6fb!important;color:#172033!important;}"+
      ".ld-logo,.upload-logo,.topbar-logo{color:#1f76ff!important;}"+
      ".ld-logo span,.upload-logo span,.topbar-logo span{color:#172033!important;}"+
      ".topbar{background:rgba(255,255,255,.96)!important;border-bottom:1px solid #e3e8f2!important;box-shadow:0 10px 30px rgba(23,32,51,.08)!important;backdrop-filter:blur(16px)!important;}"+
      ".topbar-logo{font-family:Inter,Arial,sans-serif!important;font-weight:900!important;letter-spacing:.02em!important;}"+
      ".topbar-divider{background:#e3e8f2!important;}"+
      ".main{padding:1.25rem 1.4rem 2.5rem!important;}"+
      ".filters{gap:.7rem!important;}"+
      ".filter-group{min-width:0!important;}"+
      ".filter-group label,.kpi-label,.kpi-sub,.chart-card h3,.table-header h3,.fin-kpi-label,.fin-kpi-sub,.goal-week,.table-search,.file-name,.footer{color:#667085!important;}"+
      ".filter-group label,.kpi-label,.chart-card h3,.table-header h3,.fin-kpi-label{font-family:Inter,Arial,sans-serif!important;font-size:.68rem!important;font-weight:800!important;letter-spacing:.08em!important;}"+
      ".filter-group select,.v02-native-select,.table-search,.audit-filter select,.audit-filter input{background:#fff!important;color:#172033!important;border:1px solid #cfd8e8!important;border-radius:8px!important;box-shadow:0 1px 2px rgba(23,32,51,.04)!important;color-scheme:light!important;}"+
      ".filter-group select:focus,.v02-native-select:focus,.table-search:focus{outline:3px solid rgba(31,118,255,.16)!important;border-color:#1f76ff!important;}"+
      ".filter-group select option,.v02-native-select option{background:#fff!important;color:#172033!important;}"+
      "#f-ano-single-wrap,#f-tipo-single-wrap,#f-pgto-single-wrap,#mes-btn,#grupo-btn,#semana-btn,#dia-btn,#produto-btn,#mes-dropdown,#grupo-dropdown,#semana-dropdown,#dia-dropdown,#produto-dropdown{display:none!important;}"+
      ".v02-native-select{display:block!important;width:100%!important;min-width:118px!important;min-height:42px!important;padding:.55rem .68rem!important;font-size:.94rem!important;font-weight:750!important;}"+
      ".kpi-card,.chart-card,.table-card,.audit-box,.audit-result-card,.audit-card,.audit-analytic-card,.goal-panel,.goal-gauge-card,.drink-summary-card,.fin-zone,.fin-kpi{background:#fff!important;background-image:none!important;border:1px solid #e3e8f2!important;border-radius:10px!important;box-shadow:0 12px 28px rgba(23,32,51,.09)!important;color:#172033!important;overflow:hidden!important;}"+
      ".kpi-card::after,.fin-kpi::after,.chart-card::after,.table-card::after,.audit-box::after,.audit-result-card::after,.audit-card::after,.audit-analytic-card::after,.fin-zone::after,.goal-panel::after,.goal-gauge-card::after,.drink-summary-card::after{display:none!important;}"+
      ".kpi-card::before,.fin-kpi::before,.goal-panel::before{height:4px!important;background:var(--kpi-color,#1f76ff)!important;box-shadow:none!important;}"+
      ".kpi-card:hover,.fin-kpi:hover,.chart-card:hover,.table-card:hover,.audit-box:hover,.audit-result-card:hover,.audit-card:hover,.audit-analytic-card:hover,.fin-zone:hover,.goal-panel:hover,.goal-gauge-card:hover,.drink-summary-card:hover{transform:none!important;border-color:#c9d5e8!important;box-shadow:0 16px 38px rgba(23,32,51,.12)!important;}"+
      ".kpi-value,.fin-kpi-val,.audit-result-value,.goal-title,.goal-meta,.goal-value,.goal-pct,.audit-card-title{font-family:Inter,Arial,sans-serif!important;color:#172033!important;font-weight:900!important;letter-spacing:-.01em!important;}"+
      ".section-title{font-family:Inter,Arial,sans-serif!important;font-size:1.05rem!important;font-weight:900!important;letter-spacing:.02em!important;color:#172033!important;text-transform:none!important;}"+
      ".section-title::after{background:#e3e8f2!important;}"+
      ".section-title .tag{font-family:Inter,Arial,sans-serif!important;background:#eaf2ff!important;color:#1f76ff!important;border-radius:999px!important;padding:.22rem .62rem!important;font-weight:800!important;}"+
      ".fin-zone-title{font-family:Inter,Arial,sans-serif!important;font-weight:900!important;letter-spacing:.02em!important;}"+
      ".fin-zone-title .dot{box-shadow:none!important;}"+
      ".table-header,.audit-card-head,.audit-analytic-head{background:#fff!important;border-bottom:1px solid #e3e8f2!important;}"+
      "thead th,.audit-analytic-table th{background:#f7f9fc!important;color:#667085!important;border-bottom:1px solid #e3e8f2!important;}"+
      "tbody tr,.audit-analytic-table td{border-bottom:1px solid #edf1f7!important;}"+
      "tbody tr:hover,tbody tr:hover td,.audit-analytic-table tr:hover td{background:#f8fbff!important;}"+
      "tbody td,.audit-analytic-table td{color:#172033!important;}"+
      ".fin-zone.receita,.fin-zone.despesas{background:#fff!important;border-left-width:5px!important;}"+
      ".fin-zone.receita{border-left-color:#00a86b!important;border-top-color:#00a86b!important;}"+
      ".fin-zone.despesas{border-left-color:#e5484d!important;border-top-color:#e5484d!important;}"+
      ".fin-zone.receita .fin-zone-title,.fin-zone.receita .fin-kpi-val,.audit-col.entradas .mini-label,.audit-col.entradas .mini-value,.audit-analytic-table td.pos{color:#008f5d!important;}"+
      ".fin-zone.despesas .fin-zone-title,.fin-zone.despesas .fin-kpi-val,.audit-col.saidas .mini-label,.audit-col.saidas .mini-value,.audit-analytic-table td.neg,.audit-result-card.neg .audit-result-value{color:#c7324b!important;}"+
      ".ld-track,.ld-bar-wrap,.lucro-bar-track{background:#e3e8f2!important;stroke:#e3e8f2!important;}"+
      ".ld-fill,.ld-bar{stroke:#1f76ff!important;background:#1f76ff!important;box-shadow:none!important;}"+
      ".semi-gauge::after{background:#fff!important;box-shadow:inset 0 5px 14px rgba(23,32,51,.08)!important;}"+
      ".reload-btn{background:#fff!important;border:1px solid #cfd8e8!important;color:#172033!important;border-radius:8px!important;}"+
      ".upload-btn{background:#1f76ff!important;color:#fff!important;border-radius:8px!important;}"+
      "canvas{filter:none!important;}"+
      "@media(max-width:1024px),(pointer:coarse){.main{padding:1rem .82rem 2rem!important}.filters{display:grid!important;grid-template-columns:1fr 1fr!important;width:100%!important}.filter-group{width:100%!important}.filter-group select,.v02-native-select{width:100%!important;min-width:0!important;min-height:42px!important}.section-title{text-transform:uppercase!important;letter-spacing:.05em!important}.kpi-value,.fin-kpi-val{font-size:1.38rem!important}}";
    doc.head.appendChild(style);
  }

  function rgba(hex, alpha){
    var clean = hex.replace("#", "");
    var r = parseInt(clean.substring(0,2), 16);
    var g = parseInt(clean.substring(2,4), 16);
    var b = parseInt(clean.substring(4,6), 16);
    return "rgba(" + r + "," + g + "," + b + "," + alpha + ")";
  }

  function chartList(win){
    if(!win.Chart) return [];
    var instances = win.Chart.instances;
    if(!instances) return [];
    if(typeof instances.forEach === "function"){
      var out = [];
      instances.forEach(function(chart){ out.push(chart); });
      return out;
    }
    return Object.keys(instances).map(function(key){ return instances[key]; }).filter(Boolean);
  }

  function tuneChartColors(win){
    chartList(win).forEach(function(chart){
      if(!chart || chart.$v02Modern) return;
      chart.$v02Modern = true;
      var opts = chart.options || (chart.options = {});
      opts.color = "#344054";
      opts.font = opts.font || {};
      opts.font.family = "Inter, Arial, sans-serif";
      opts.plugins = opts.plugins || {};
      opts.plugins.legend = opts.plugins.legend || {};
      opts.plugins.legend.labels = opts.plugins.legend.labels || {};
      opts.plugins.legend.labels.color = "#344054";
      opts.plugins.legend.labels.usePointStyle = true;
      opts.plugins.tooltip = opts.plugins.tooltip || {};
      opts.plugins.tooltip.backgroundColor = "#111827";
      opts.plugins.tooltip.titleColor = "#ffffff";
      opts.plugins.tooltip.bodyColor = "#f9fafb";
      opts.plugins.tooltip.borderColor = "rgba(255,255,255,.12)";
      opts.plugins.tooltip.borderWidth = 1;
      Object.keys(opts.scales || {}).forEach(function(axis){
        var scale = opts.scales[axis];
        scale.ticks = scale.ticks || {};
        scale.grid = scale.grid || {};
        scale.ticks.color = "#667085";
        scale.grid.color = "rgba(102,112,133,.16)";
        scale.border = scale.border || {};
        scale.border.color = "rgba(102,112,133,.20)";
      });
      (chart.data && chart.data.datasets || []).forEach(function(ds, index){
        var color = palette[index % palette.length];
        var isPie = Array.isArray(ds.backgroundColor) || /pie|doughnut|polar/i.test(chart.config && chart.config.type || "");
        if(isPie){
          var count = (chart.data.labels || ds.data || []).length || palette.length;
          ds.backgroundColor = Array.from({length:count}, function(_, i){ return rgba(palette[i % palette.length], .88); });
          ds.borderColor = "#ffffff";
          ds.borderWidth = 2;
        }else{
          ds.borderColor = color;
          ds.backgroundColor = rgba(color, chart.config && chart.config.type === "line" ? .16 : .82);
          ds.pointBackgroundColor = color;
          ds.pointBorderColor = "#ffffff";
          ds.pointBorderWidth = 2;
          ds.borderWidth = Math.max(ds.borderWidth || 0, 2);
          if(chart.config && chart.config.type === "line") ds.tension = .34;
        }
      });
      try{ chart.update("none"); }catch(e){}
    });
  }

  function installNativeFilters(win, doc){
    showOriginalSelect(doc, "f-ano");
    showOriginalSelect(doc, "f-tipo");
    showOriginalSelect(doc, "f-pgto");
    createNativeFilter(win, doc, "mes", "Mes");
    createNativeFilter(win, doc, "grupo", "Grupo");
    createNativeFilter(win, doc, "semana", "Semana do Mes");
    createNativeFilter(win, doc, "dia", "Dia da Semana");
    createNativeFilter(win, doc, "produto", "Produto");
  }

  function showOriginalSelect(doc, id){
    var sel = doc.getElementById(id);
    if(!sel) return;
    sel.style.display = "block";
    var wrap = doc.getElementById(id + "-single-wrap");
    if(wrap) wrap.style.display = "none";
  }

  function createNativeFilter(win, doc, key, label){
    var optionsWrap = doc.getElementById(key + "-options");
    var button = doc.getElementById(key + "-btn");
    if(!optionsWrap || !button) return false;
    var group = button.closest ? button.closest(".filter-group") : button.parentNode;
    if(!group) return false;
    var nativeId = "v02-native-" + key;
    var select = doc.getElementById(nativeId);
    if(!select){
      select = doc.createElement("select");
      select.id = nativeId;
      select.className = "v02-native-select";
      select.setAttribute("aria-label", label);
      group.appendChild(select);
      select.addEventListener("change", function(){ applyNativeValue(win, doc, key, select.value); });
    }
    return populateNativeOptions(doc, key, select);
  }

  function populateNativeOptions(doc, key, select){
    var optionsWrap = doc.getElementById(key + "-options");
    if(!optionsWrap) return false;
    var opts = Array.prototype.slice.call(optionsWrap.querySelectorAll(".ms-opt[data-key='" + key + "']"));
    if(!opts.length) return false;
    var current = select.value;
    select.innerHTML = "";
    var all = doc.createElement("option");
    all.value = "";
    all.textContent = key === "semana" ? "Todas" : "Todos";
    select.appendChild(all);
    opts.forEach(function(opt){
      var value = opt.getAttribute("data-val") || "";
      var option = doc.createElement("option");
      option.value = value;
      option.textContent = value;
      select.appendChild(option);
    });
    if(current && opts.some(function(opt){ return opt.getAttribute("data-val") === current; })) select.value = current;
    return true;
  }

  function applyNativeValue(win, doc, key, value){
    clearMsWithoutRender(doc, key);
    if(value) selectMsWithoutRender(doc, key, value);
    if(typeof win.scheduleApplyFilters === "function") win.scheduleApplyFilters();
    else if(typeof win.applyFilters === "function") win.applyFilters();
    setTimeout(function(){ tuneChartColors(win); }, 700);
  }

  function clearMsWithoutRender(doc, key){
    var label = doc.getElementById(key + "-label");
    Array.prototype.forEach.call(doc.querySelectorAll(".ms-opt[data-key='" + key + "']"), function(el){
      el.classList.remove("ms-on");
      var chk = el.querySelector(".ms-chk");
      if(chk){ chk.textContent = ""; }
    });
    if(label) label.textContent = key === "semana" ? "Todas" : "Todos";
  }

  function selectMsWithoutRender(doc, key, value){
    var opts = Array.prototype.slice.call(doc.querySelectorAll(".ms-opt[data-key='" + key + "']"));
    var opt = opts.find(function(item){ return item.getAttribute("data-val") === value; });
    if(!opt) return;
    opt.classList.add("ms-on");
    var chk = opt.querySelector(".ms-chk");
    if(chk){ chk.textContent = "\u2713"; }
    var label = doc.getElementById(key + "-label");
    if(label) label.textContent = value;
  }

  loadFrame();
})();
</script>
</body>
</html>
