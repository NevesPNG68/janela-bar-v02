<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JANELA BAR - Dashboard mobile v02</title>
<style>
  :root{--bg:#0a0a0f;--card:#18181f;--border:#26263a;--accent:#f5a623;--text:#f0f0f8;--muted:#d7d4ef}
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:Arial,sans-serif;overflow:hidden}
  #boot{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center}
  .box{max-width:760px;background:var(--card);border:1px solid var(--border);border-top:4px solid var(--accent);border-radius:16px;padding:28px;box-shadow:0 0 24px rgba(245,166,35,.18)}
  h1{margin:0 0 12px;color:var(--accent);letter-spacing:.04em}p{line-height:1.5;color:var(--muted)}
  a{color:var(--accent);font-weight:bold}
  #mobile-shell{display:none;min-height:100dvh;background:var(--bg)}
  .mobile-status{position:fixed;left:10px;right:10px;top:10px;z-index:20;background:rgba(10,10,15,.94);border:1px solid var(--border);border-top:3px solid var(--accent);border-radius:12px;padding:10px 12px;box-shadow:0 12px 30px rgba(0,0,0,.35)}
  .mobile-status strong{display:block;color:var(--accent);font-size:.82rem;letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px}
  .mobile-status span{display:block;color:var(--muted);font-size:.76rem;line-height:1.3}
  .mobile-status button{margin-top:8px;background:var(--accent);border:0;color:#0a0a0f;border-radius:8px;padding:8px 10px;font-weight:800}
  #dashboard-frame{position:fixed;inset:0;width:100%;height:100dvh;border:0;background:var(--bg)}
  .ready .mobile-status{display:none}
</style>
</head>
<body>
<div id="boot"><div class="box"><h1>JANELA BAR</h1><p>Carregando dashboard...</p></div></div>
<div id="mobile-shell">
  <iframe id="dashboard-frame" title="JANELA BAR Dashboard mobile"></iframe>
  <div class="mobile-status" id="mobile-status">
    <strong>Modo mobile v02</strong>
    <span id="mobile-status-text">Abrindo com filtros nativos no celular.</span>
    <button type="button" id="mobile-retry" style="display:none">Tentar carregar novamente</button>
  </div>
</div>
<script>
(function(){
  var isPreview = location.hostname === "raw.githack.com";
  var DASHBOARD_URL = isPreview ? "https://raw.githack.com/NevesPNG68/janela-bar-dashboard/main/" : "/janela-bar-dashboard/";
  var MOBILE_QUERY = "(max-width: 820px), (pointer: coarse)";
  var isMobile = window.matchMedia && window.matchMedia(MOBILE_QUERY).matches;

  if(!isMobile){
    window.location.replace(DASHBOARD_URL + "?v=" + Date.now());
    return;
  }

  var boot = document.getElementById("boot");
  var shell = document.getElementById("mobile-shell");
  var frame = document.getElementById("dashboard-frame");
  var statusText = document.getElementById("mobile-status-text");
  var retry = document.getElementById("mobile-retry");
  var pollTimer = null;
  var safetyTimer = null;

  boot.style.display = "none";
  shell.style.display = "block";
  document.documentElement.style.overflow = "hidden";
  document.body.style.overflow = "hidden";

  function setStatus(text, showRetry){
    statusText.textContent = text;
    retry.style.display = showRetry ? "inline-block" : "none";
    shell.classList.remove("ready");
  }

  function loadFrame(){
    setStatus("Abrindo com filtros nativos no celular.", false);
    frame.src = DASHBOARD_URL + "?mobileNative=1&v=" + Date.now();
    clearTimeout(safetyTimer);
    safetyTimer = setTimeout(function(){
      setStatus("A montagem demorou no celular. A tela preta foi bloqueada; tente novamente sem sair deste link.", true);
      try{
        var d = frame.contentDocument;
        if(!d) return;
        revealDashboard(d);
        var upload = d.getElementById("upload-screen");
        var hint = d.getElementById("hosted-status");
        if(upload) upload.style.display = "flex";
        if(hint) hint.textContent = "A montagem demorou no celular. Tente novamente ou selecione a planilha localmente.";
      }catch(e){}
    }, 18000);
  }

  retry.addEventListener("click", loadFrame);
  frame.addEventListener("load", function(){
    setStatus("Preparando filtros nativos do celular...", false);
    patchDashboardRuntime();
  });

  function patchDashboardRuntime(){
    var doc;
    try{ doc = frame.contentDocument || frame.contentWindow.document; }
    catch(err){ setStatus("Nao foi possivel ajustar o modo mobile automaticamente.", true); return; }
    if(!doc) return;

    injectMobileCss(doc);
    clearInterval(pollTimer);
    pollTimer = setInterval(function(){
      try{
        injectMobileCss(doc);
        installNativeFilters(frame.contentWindow, doc);
        preventBlackScreen(doc);
        var dashboard = doc.getElementById("dashboard");
        if(dashboard && dashboard.style.display !== "none"){
          clearTimeout(safetyTimer);
          shell.classList.add("ready");
        }
      }catch(e){}
    }, 700);
  }

  function injectMobileCss(doc){
    if(doc.getElementById("v02-mobile-native-style")) return;
    var style = doc.createElement("style");
    style.id = "v02-mobile-native-style";
    style.textContent = "@media (max-width:1024px),(pointer:coarse){"+
      "html,body{background:#0a0a0f!important;}"+
      "#loading-screen{background:#0a0a0f!important;color:#f0f0f8!important;}"+
      "#loading-screen:after{content:'Carregando painel no celular...';color:#d7d4ef;font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;}"+
      ".filters{display:grid!important;grid-template-columns:1fr 1fr!important;gap:.72rem!important;width:100%!important;}"+
      ".filter-group{min-width:0!important;width:100%!important;}"+
      ".filter-group select,.v02-native-select{display:block!important;width:100%!important;min-width:0!important;min-height:44px!important;background:#171722!important;color:#fff!important;border:1px solid #393954!important;border-radius:9px!important;padding:.56rem .7rem!important;font-size:1rem!important;font-weight:900!important;color-scheme:dark!important;}"+
      ".filter-group select option,.v02-native-select option{background:#171722!important;color:#fff!important;}"+
      "#f-ano-single-wrap,#f-tipo-single-wrap,#f-pgto-single-wrap,#mes-btn,#grupo-btn,#semana-btn,#dia-btn,#produto-btn,#mes-dropdown,#grupo-dropdown,#semana-dropdown,#dia-dropdown,#produto-dropdown{display:none!important;}"+
      "}";
    doc.head.appendChild(style);
  }

  function revealDashboard(doc){
    var loading = doc.getElementById("loading-screen");
    var dashboard = doc.getElementById("dashboard");
    if(dashboard) dashboard.style.display = "block";
    if(loading) loading.style.display = "none";
  }

  function preventBlackScreen(doc){
    var loading = doc.getElementById("loading-screen");
    if(!loading) return;
    loading.style.background = "#0a0a0f";
    var pct = parseInt((doc.getElementById("ld-num") || {}).textContent || "0", 10);
    var step = ((doc.getElementById("ld-step") || {}).textContent || "").toLowerCase();
    if(pct >= 96 || step.indexOf("pronto") >= 0) revealDashboard(doc);
  }

  function installNativeFilters(win, doc){
    showOriginalSelect(doc, "f-ano");
    showOriginalSelect(doc, "f-tipo");
    showOriginalSelect(doc, "f-pgto");
    createNativeFilter(win, doc, "mes", "Mes", false);
    createNativeFilter(win, doc, "grupo", "Grupo", false);
    createNativeFilter(win, doc, "semana", "Semana do Mes", false);
    createNativeFilter(win, doc, "dia", "Dia da Semana", false);
    createNativeFilter(win, doc, "produto", "Produto", true);
  }

  function showOriginalSelect(doc, id){
    var sel = doc.getElementById(id);
    if(!sel) return;
    sel.style.display = "block";
    var wrap = doc.getElementById(id + "-single-wrap");
    if(wrap) wrap.style.display = "none";
  }

  function createNativeFilter(win, doc, key, label, lazy){
    var optionsWrap = doc.getElementById(key + "-options");
    var button = doc.getElementById(key + "-btn");
    if(!optionsWrap || !button) return false;
    var group = button.closest ? button.closest(".filter-group") : button.parentNode;
    if(!group) return false;

    var nativeId = "v02-native-" + key;
    var select = doc.getElementById(nativeId);
    if(!select){
      select = doc.createElement("select");
      select.id = nativeId;
      select.className = "v02-native-select";
      select.setAttribute("aria-label", label);
      select.dataset.loaded = "0";
      group.appendChild(select);
      select.addEventListener("focus", function(){ populateNativeOptions(doc, key, select, true); });
      select.addEventListener("pointerdown", function(){ populateNativeOptions(doc, key, select, true); });
      select.addEventListener("change", function(){ applyNativeValue(win, doc, key, select.value); });
    }

    if(lazy && select.dataset.loaded !== "1"){
      select.innerHTML = '<option value="">Todos</option><option value="__load__">Toque para carregar produtos</option>';
      return true;
    }
    return populateNativeOptions(doc, key, select, false);
  }

  function populateNativeOptions(doc, key, select, force){
    if(select.dataset.loaded === "1" && !force) return true;
    var optionsWrap = doc.getElementById(key + "-options");
    if(!optionsWrap) return false;
    var opts = Array.prototype.slice.call(optionsWrap.querySelectorAll(".ms-opt[data-key='" + key + "']"));
    if(!opts.length) return false;
    var current = select.value === "__load__" ? "" : select.value;
    select.innerHTML = "";
    var all = doc.createElement("option");
    all.value = "";
    all.textContent = key === "semana" ? "Todas" : "Todos";
    select.appendChild(all);
    opts.forEach(function(opt){
      var value = opt.getAttribute("data-val") || "";
      var option = doc.createElement("option");
      option.value = value;
      option.textContent = value;
      select.appendChild(option);
    });
    if(current && opts.some(function(opt){ return opt.getAttribute("data-val") === current; })) select.value = current;
    select.dataset.loaded = "1";
    return true;
  }

  function applyNativeValue(win, doc, key, value){
    if(value === "__load__") return;
    clearMsWithoutRender(doc, key);
    if(value) selectMsWithoutRender(doc, key, value);
    if(typeof win.scheduleApplyFilters === "function") win.scheduleApplyFilters();
    else if(typeof win.applyFilters === "function") win.applyFilters();
  }

  function clearMsWithoutRender(doc, key){
    var label = doc.getElementById(key + "-label");
    Array.prototype.forEach.call(doc.querySelectorAll(".ms-opt[data-key='" + key + "']"), function(el){
      el.classList.remove("ms-on");
      el.style.color = "var(--muted)";
      var chk = el.querySelector(".ms-chk");
      if(chk){
        chk.textContent = "";
        chk.style.background = "";
        chk.style.borderColor = "rgba(255,255,255,.92)";
      }
    });
    if(label) label.textContent = key === "semana" ? "Todas" : "Todos";
  }

  function selectMsWithoutRender(doc, key, value){
    var opts = Array.prototype.slice.call(doc.querySelectorAll(".ms-opt[data-key='" + key + "']"));
    var opt = opts.find(function(item){ return item.getAttribute("data-val") === value; });
    if(!opt) return;
    opt.classList.add("ms-on");
    opt.style.color = "var(--text)";
    var chk = opt.querySelector(".ms-chk");
    if(chk){
      chk.textContent = "\u2713";
      chk.style.background = "var(--accent)";
      chk.style.borderColor = "#ffffff";
      chk.style.color = "#000";
    }
    var label = doc.getElementById(key + "-label");
    if(label) label.textContent = value;
  }

  loadFrame();
})();
</script>
</body>
</html>
